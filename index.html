<!DOCTYPE <html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Y Register</title>
    <link rel="stylesheet" href="assets/css/loginStyle.css" />
</head>
<body>
    <main>
        <div class="contenedor_todo">
            <div class="caja_trasera">
                <div class="caja_trasera_login">
                    <img src="assets/img/LogoRestaurante.png" alt="Logo Restaurante" class="logo_restaurante" />
                    <button id="btn_login">Iniciar Sesión</button>
                </div>
            </div>

            <!--Formulario de Login-->
            <div class="contenedor_login">
                <form class="formulario_login">
                    <h2>Iniciar Sesión</h2>
                    <input type="text" placeholder="Usuario" id="usuario" />
                    <input type="password" placeholder="Contraseña" id="password" />
                </form>
                <button id="btn_entrar">Entrar</button>
                <button id="btn_cancelar">Cancelar</button>
                <a href="">Olvidó su contraseña</a>
            </div>
        </div>
    </main>
    <script type= "module" src="assets/js/loginScripts.js"></script>
</body>
</html>
