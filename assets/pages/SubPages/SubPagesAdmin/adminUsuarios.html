<!DOCTYPE <html>
<html lang="en">
<head>
    <script>
        const usuario = localStorage.getItem("usuario");
        if (!usuario) {
            window.location.href = "../../index.html";
        }
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Admin</title>
    <link rel="stylesheet" href="../../../css/AdminStyles/adminUsuarios.css" />
    <link rel="stylesheet" href="../../../css/menuLateralStyles.css" />
</head>
<body>
    <!-- Menú Lateral -->
    <div id="menu-container"></div>

    <main>
        <div id="card_principal" class="card_principal">
            <button id="abrirModal" class="btn_agregar">+ Agregar Usuario</button>
            <hr class="separation"></hr>
            <div class="mostrar_meseros">
                <div id="mesero" class="mesero_card">
                    <div class="mesero_info">
                        <h2 id="name_card" class="name">Nombre: </h2>
                        <p id="phone_card" class="phone">Numero Telefonico: </p>
                        <p id="email_card" class="email">Correo Electrónico: </p>
                    </div>
                    <div class="mesero_options">
                        <button class="delete-button">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="modalAgregar" class="modal">
            <div class="modal_content">
                <span class="cerrar">&times;</span>
                <h2>Agregar Usuario</h2>
                <input type="text" id="nuevoNombre" placeholder="Usuario">
                <input type="text" id="nuevoTelefono" placeholder="Teléfono">
                <input type="email" id="nuevoCorreo" placeholder="Correo">
                <div class="password_container">
                    <input type="password" id="nuevoPassword" placeholder="Contraseña">
                    <button type="button" class="toggle-password">👁</button>
                </div>
                <button id="btn_crear">Crear Usuario</button>
            </div>
        </div>
        <div id="modalEditar" class="modal">
            <div class="modal_content">
                <span class="cerrarEditar">&times;</span>
                <h2>Editar Usuario</h2>
                <input type="hidden" id="editId">
                <input type="text" id="editNombre" placeholder="Usuario">
                <input type="text" id="editTelefono" placeholder="Teléfono">
                <input type="email" id="editCorreo" placeholder="Correo">
                <div class="password_container">
                    <input type="password" id="editPassword" placeholder="Nueva contraseña">
                    <button type="button" class="toggle-password">👁</button>
                </div>
                <button id="btn_guardar_edicion">Guardar Cambios</button>
            </div>
        </div>
    </main>
    <script type="module" src="../../../js/AdminScripts/adminUsuarios.js"></script>
    <script type="module" src="../../../js/globalScripts.js"></script>
</body>
</html>
